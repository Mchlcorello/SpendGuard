name: Docker Build and Scan

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-images:
    name: Build and Test Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [development, staging, production]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./compose/Dockerfile
          push: false
          tags: spendguard/budget-app:test-${{ matrix.configuration }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ANGULAR_CONFIGURATION=${{ matrix.configuration }}

      - name: Test image
        run: |
          docker run -d --name test-container spendguard/budget-app:test-${{ matrix.configuration }}
          sleep 5
          docker exec test-container wget -q -O /dev/null http://localhost/health || exit 1
          docker stop test-container
          docker rm test-container

  scan-vulnerabilities:
    name: Scan for Vulnerabilities
    runs-on: ubuntu-latest
    needs: [build-test-images]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-repo-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-repo-results.sarif'

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
